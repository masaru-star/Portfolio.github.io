<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Inline Tetris</title>
<style>
  body { background: #111; color: #fff; display: flex; gap: 20px; padding: 20px; font-family: sans-serif; }
  #game { display: grid; grid-template-rows: repeat(20, 24px); grid-template-columns: repeat(10, 24px); background:#222; }
  .cell { width:24px; height:24px; box-sizing:border-box; border:1px solid #333; }
  .ghost { 
    background: rgba(255, 255, 255, 0.2) !important;
    border: 1px solid #fff !important;
  }
  
  #hold, .next-box {
  width: 80px;
  height: 80px;
  background:#222;
  display:grid;
  grid-template: repeat(4,20px) / repeat(4,20px);
  margin-bottom: 10px;
  }
  .mini {
  width:20px;
  height:20px;
  border:1px solid #333;
  box-sizing:border-box;
  }

  #leftPanel { width: 150px; }
  #nextPanel { width: 150px; }

  #garbageInfo { margin-top: 20px; }

  /* ★変更: リザルト画面のスタイルを修正 */
  #resultOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh; /* 画面の高さ全体を占める */
    background: rgba(0, 0, 0, 0.8);
    display: none; /* 初期状態では非表示 */
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }
  #resultBox {
    background: #333;
    padding: 30px;
    border-radius: 10px;
    width: 80%;
    max-width: 600px;
    /* ★追加: ボックスの最大高さを設定し、オーバーフロー時にスクロールを許可 */
    max-height: 90vh; 
    overflow-y: auto; 
  }
  #rankingTable {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }
  #rankingTable th, #rankingTable td {
    padding: 8px;
    border: 1px solid #555;
    text-align: left;
  }
  #rankingTable th {
    background-color: #444;
  }
  #nameInput {
    width: 100px;
    padding: 5px;
    margin: 5px;
  }
</style>
</head>
<body>

<div id="leftPanel">
  <div>HOLD</div>
  <div id="hold"></div>

  <input type="hidden" id="freqSlider" value="20" />

  <div id="garbageInfo">
    <div>Incoming: <span id="incomingNum">0</span></div>
    <div>Time: <span id="incomingTime">0</span>ms</div>
  </div>

  <div style="margin-top:20px;">
    <div>LINES: <span id="linesCount">0</span></div>
    <div>TIME: <span id="timerDisplay">00:00</span></div>
  </div>
</div>

<div id="game"></div>

<div id="nextPanel">
  <div>NEXT</div>
  <div id="next1" class="next-box"></div>
  <div id="next2" class="next-box"></div>
  <div id="next3" class="next-box"></div>
  <div id="next4" class="next-box"></div>
  <div id="next5" class="next-box"></div>
</div>

<div id="resultOverlay">
  <div id="resultBox">
    <h2>GAME OVER</h2>
    <h3>Your Score:</h3>
    <div>LINES Cleared: <span id="finalLines">0</span></div>
    <div>Time Elapsed: <span id="finalTime">00:00</span></div>

    <h3 style="margin-top: 20px;">Ranking Registration</h3>
    <p>Enter your name (up to 10 chars):</p>
    <input type="text" id="nameInput" maxlength="10" placeholder="Name">
    <button onclick="registerScore()">Submit</button>

    <h3 style="margin-top: 20px;">TOP 15 RANKING</h3>
    <table id="rankingTable">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Name</th>
          <th>Lines</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="rankingBody">
      </tbody>
    </table>

    <button style="margin-top: 30px; padding: 10px 20px;" onclick="window.location.reload()">Play Again</button>
  </div>
</div>

<script>
// ====== 基本設定 ======
const ROW = 20, COL = 10;
const game = document.getElementById("game");
const holdBox = document.getElementById("hold");

let linesCleared = 0;
let startTime = Date.now();
let timerInterval;

// グリッド生成
let field = Array.from({length:ROW},()=>Array(COL).fill(0));
for(let r=0;r<ROW;r++){
  for(let c=0;c<COL;c++){
    const div=document.createElement("div");
    div.className="cell";
    div.id=`cell-${r}-${c}`;
    game.appendChild(div);
  }
}

// テトリミノ形
const TETROS = {
  I: [[1,1,1,1]],
  O: [[1,1],[1,1]],
  T: [[1,1,1],[0,1,0]],
  S: [[0,1,1],[1,1,0]],
  Z: [[1,1,0],[0,1,1]],
  J: [[1,0,0],[1,1,1]],
  L: [[0,0,1],[1,1,1]]
};
const COLORS = {I:"#0ff",O:"#ff0",T:"#a0f",S:"#0f0",Z:"#f00",J:"#00f",L:"#fa0"};

// 7種バッグ
let bag = [];
function refillBag(){
  bag = Object.keys(TETROS).sort(()=>Math.random()-0.5);
}
function nextTetro(){
  if(bag.length===0) refillBag();
  const type = bag.pop();
  return { type, shape: TETROS[type].map(r=>[...r]), row:0, col:3 };
}

let cur = nextTetro();
let nextQueue = [nextTetro(), nextTetro(), nextTetro(), nextTetro(), nextTetro()];
let hold = null;
let holdUsed = false;

// ====== 回転 ======
function rotate(shape, dir){
  const N = shape.length;
  const M = shape[0].length;
  let res = Array.from({length:M},()=>Array(N).fill(0));
  for(let r=0;r<N;r++) for(let c=0;c<M;c++){
    if(dir>0) res[c][N-1-r] = shape[r][c];
    else res[M-1-c][r] = shape[r][c];
  }
  return res;
}

// ====== 衝突判定 ======
function collision(t){
  const sh=t.shape;
  for(let r=0;r<sh.length;r++) for(let c=0;c<sh[0].length;c++){
    if(!sh[r][c]) continue;
    let nr = t.row+r;
    let nc = t.col+c;
    // 範囲外チェックと固定ブロックチェック
    if(nr<0||nr>=ROW||nc<0||nc>=COL || field[nr][nc]) return true;
  }
  return false;
}

// ====== ゴーストテトリミノの着地地点を計算 ======
function getGhostRow(t){
  let ghostRow = t.row;
  while(!collision({...t, row: ghostRow + 1})) {
    ghostRow++;
  }
  return ghostRow;
}


// ====== 描画 ======
function draw(){
  // 描画前にすべてのセルから ghost クラスを削除
  for(let r=0;r<ROW;r++) for(let c=0;c<COL;c++){
    const cell=document.getElementById(`cell-${r}-${c}`);
    cell.className="cell"; // 元のクラス名に戻す
    cell.style.background = field[r][c] || "#222"; // フィールドの色を再設定
  }

  // ゴーストテトリミノを描画
  const ghostRow = getGhostRow(cur);
  for(let r=0;r<cur.shape.length;r++) for(let c=0;c<cur.shape[0].length;c++){
    if(cur.shape[r][c]){
      const cell=document.getElementById(`cell-${ghostRow+r}-${cur.col+c}`);
      if(cur.row+r !== ghostRow+r || cur.col+c !== cur.col+c){ 
          cell.classList.add("ghost");
      }
    }
  }

  // 現在ミノを描画
  for(let r=0;r<cur.shape.length;r++) for(let c=0;c<cur.shape[0].length;c++){
    if(cur.shape[r][c]){
      const cell=document.getElementById(`cell-${cur.row+r}-${cur.col+c}`);
      cell.classList.remove("ghost");
      cell.style.background = COLORS[cur.type];
    }
  }

  drawHold();
  drawNext();
  drawGarbageInfo();
  document.getElementById("linesCount").textContent = linesCleared;
}

// HOLD描画
function drawHold(){
  holdBox.innerHTML="";
  for(let i=0;i<16;i++){
    const d=document.createElement("div"); d.className="mini";
    holdBox.appendChild(d);
  }
  if(!hold) return;
  const sh=hold.shape;
  for(let r=0;r<sh.length;r++) for(let c=0;c<sh[0].length;c++){
    if(sh[r][c]){
      const idx = r*4+c;
      holdBox.children[idx].style.background = COLORS[hold.type];
    }
  }
}

// NEXT(5枠)描画
function drawNext(){
  for(let i=0;i<5;i++){
    const box = document.getElementById("next"+(i+1));
    box.innerHTML="";
    for(let j=0;j<16;j++){
      const d=document.createElement("div"); d.className="mini";
      box.appendChild(d);
    }
    const n = nextQueue[i];
    const sh = n.shape;
    for(let r=0;r<sh.length;r++) for(let c=0;c<sh[0].length;c++){
      if(sh[r][c]){
        const idx=r*4+c;
        box.children[idx].style.background = COLORS[n.type];
      }
    }
  }
}

// ====== 固定 ======
function lock(){
  const sh=cur.shape;
  for(let r=0;r<sh.length;r++) for(let c=0;c<sh[0].length;c++){
    if(sh[r][c]) field[cur.row+r][cur.col+c] = COLORS[cur.type];
  }
  lineClear();
  cur = nextQueue.shift();
  nextQueue.push(nextTetro());
  holdUsed = false;
  if(collision(cur)){
    gameOver();
  }
}

function lineClear(){
  let clearedRows = 0; 
  for(let r=ROW-1;r>=0;r--){
    if(field[r].every(v=>v)){ 
      field.splice(r,1); 
      field.unshift(Array(COL).fill(0)); 
      r++; 
      clearedRows++; 
    }
  }
  linesCleared += clearedRows; 
}

// ====== ホールド ======
function doHold(){
  if(holdUsed) return;
  if(!hold){
    hold = {type:cur.type, shape:TETROS[cur.type].map(r=>[...r])};
    cur = nextQueue.shift();
    nextQueue.push(nextTetro());
  } else {
    const tmp={type:cur.type, shape:cur.shape};
    cur = {type:hold.type, shape:hold.shape.map(r=>[...r]), row:0, col:3};
    hold = {type:tmp.type, shape:TETROS[tmp.type].map(r=>[...r])};
  }
  cur.row=0; cur.col=3;
  holdUsed = true;
  if(collision(cur)){
    gameOver();
  }
}

// ====== ハードドロップ ======
function hardDrop(){
  cur.row = getGhostRow(cur);
  lock();
}

// ====== キー操作 ======
document.addEventListener("keydown",e=>{
  if(document.getElementById("resultOverlay").style.display === 'flex') return;
  
  if(e.key==="ArrowLeft"){
    if(!collision({...cur, col:cur.col-1})) cur.col--;
  }
  if(e.key==="ArrowRight"){
    if(!collision({...cur, col:cur.col+1})) cur.col++;
  }
  if(e.key==="ArrowDown"){
    if(!collision({...cur, row:cur.row+1})) cur.row++;
  }
  if(e.key===" "){ hardDrop(); }
  if(e.key==="m"||e.key==="M"){
    const rot = rotate(cur.shape,1);
    if(!collision({...cur, shape:rot})) cur.shape=rot;
  }
  if(e.key==="ArrowUp"){
    const rot = rotate(cur.shape,1);
    if(!collision({...cur, shape:rot})) cur.shape=rot;
  }
  if(e.key==="z"||e.key==="Z"){ doHold(); }
  draw();
});

// ====== ガーベージ処理======
let garbageHole = null;
function addGarbage(count){
  if(garbageHole===null) garbageHole = Math.floor(Math.random()*COL);
  for(let i=0;i<count;i++){
    field.shift();
    const row = Array(COL).fill("#555");
    row[garbageHole] = 0;
    field.push(row);
  }
}

let garbageIncoming = 0;
let garbageDelay = 1200;
let garbageFreq = Number(document.getElementById("freqSlider").value);

document.getElementById("freqSlider").addEventListener("input", e=>{
  garbageFreq = Number(e.target.value);
});

// ガーベージ情報表示
function drawGarbageInfo(){
  document.getElementById("incomingNum").textContent = garbageIncoming;
  document.getElementById("incomingTime").textContent = garbageDelay;
}

// タイマー更新関数
function updateTimer(){
  const elapsed = Date.now() - startTime;
  const totalSeconds = Math.floor(elapsed / 1000);
  const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
  const seconds = String(totalSeconds % 60).padStart(2, '0');
  document.getElementById("timerDisplay").textContent = `${minutes}:${seconds}`;
  return `${minutes}:${seconds}`;
}

// ゲームオーバー関数
function gameOver(){
  clearInterval(gameInterval); 
  clearInterval(timerInterval);
  
  const finalTime = updateTimer(); 

  document.getElementById("finalLines").textContent = linesCleared;
  document.getElementById("finalTime").textContent = finalTime;
  
  loadRanking();
  
  document.getElementById("resultOverlay").style.display = 'flex';
}

// ランキング関連関数
const RANKING_KEY = 'tetrisRanking';

function getRanking(){
  const rankStr = localStorage.getItem(RANKING_KEY);
  return rankStr ? JSON.parse(rankStr) : [];
}

function saveRanking(ranking){
  localStorage.setItem(RANKING_KEY, JSON.stringify(ranking));
}

function loadRanking(){
  const ranking = getRanking();
  const body = document.getElementById('rankingBody');
  body.innerHTML = '';
  
  const top15 = ranking.slice(0, 15);
  top15.forEach((score, index) => {
    const row = body.insertRow();
    row.insertCell().textContent = index + 1;
    row.insertCell().textContent = score.name;
    row.insertCell().textContent = score.lines;
    row.insertCell().textContent = score.time;
  });

  for(let i = top15.length; i < 15; i++){
    const row = body.insertRow();
    row.insertCell().textContent = i + 1;
    row.insertCell().textContent = '-';
    row.insertCell().textContent = '-';
    row.insertCell().textContent = '-';
  }
}

function registerScore(){
  const nameInput = document.getElementById('nameInput');
  let name = nameInput.value.trim();
  
  if(!name) {
    name = "No Name";
  } else if (name.length > 10) {
    name = name.substring(0, 10);
  }

  const newScore = {
    name: name,
    lines: linesCleared,
    timeMs: Date.now() - startTime,
    time: document.getElementById("finalTime").textContent
  };

  let ranking = getRanking();
  
  ranking.push(newScore);
  ranking.sort((a, b) => {
    if(b.lines !== a.lines) {
      return b.lines - a.lines;
    }
    return a.timeMs - b.timeMs;
  });
  
  saveRanking(ranking.slice(0, 15));
  
  loadRanking();

  document.querySelector('#resultBox > button').disabled = true;
  nameInput.disabled = true;
  document.querySelector('#resultBox p').textContent = "Score Registered!";
}

// ====== 自動落下 & ガーベージ発生 ======
const gameInterval = setInterval(()=>{
  if(garbageIncoming>0){
    garbageDelay -= 200;
    if(garbageDelay<=0){
      addGarbage(garbageIncoming);
      garbageIncoming=0;
      garbageDelay=1200;
    }
  } else if(Math.random()*100 < garbageFreq){
    garbageIncoming = Math.floor(Math.random()*3)+1;
    garbageDelay = 1200;
  }

  if(!collision({...cur, row:cur.row+1})) cur.row++;
  else lock();

  draw();
},600);
timerInterval = setInterval(updateTimer, 1000);

draw();
loadRanking();
</script>
</body>
</html>
